apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-config
  labels:
    app: home-assistant
data:
  configuration.yaml: |
    # Loads default set of integrations. Do not remove.
    default_config:

    # Load frontend themes from the themes folder
    frontend:
      themes: !include_dir_merge_named themes

    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml

    # Disable default_config to allow custom http config
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.42.0.0/16

    homeassistant:
      internal_url: http://home-assistant-service:8123
      external_url: http://homeassistant.192.168.1.23.nip.io
