apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-config
  labels:
    app: home-assistant
data:
  configuration.yaml: |
    # Loads default set of integrations. Do not remove.
    default_config:

    # Load frontend themes from the themes folder
    frontend:
      themes: !include_dir_merge_named themes

    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml

    # HTTP configuration for reverse proxy
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.0.0.0/8
      # Allow all origins - running behind Traefik
      cors_allowed_origins:
        - "*"

    homeassistant:
      # Trust the X-Forwarded-For header from Traefik
      internal_url: http://home-assistant-service:8123
      external_url: http://homeassistant.192.168.1.23.nip.io
