apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant-ingress
  labels:
    app: home-assistant
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/backend-protocol: HTTP
    traefik.ingress.kubernetes.io/router.middlewares: glasgow-prod-add-forwarded@kubernetescrd
spec:
  rules:
    - host: homeassistant.192.168.1.23.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: home-assistant-service
                port:
                  number: 8123
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: add-forwarded
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-For: "192.168.1.0"
      X-Forwarded-Proto: "http"
      X-Forwarded-Host: "homeassistant.192.168.1.23.nip.io"
